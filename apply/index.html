<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기본 사주 리포트 신청 · 명리당</title>
  <meta name="description" content="기본 사주 리포트 신청 — 정보를 입력하면 카카오톡으로 연결되어 결제 및 진행 안내를 받으실 수 있습니다." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/landing.css" />
</head>
<body>

  <header class="site-header">
    <a href="/" class="brand" aria-label="명리당 홈">
      <span class="kr">운명을 읽는 곳</span>
      <span class="nm">명리당</span>
    </a>
    <a href="/" class="head-cta" aria-label="홈으로">홈</a>
  </header>

  <main class="form-page bg-cream-lt">
    <div class="wrap">
      <div class="form-card">
        <div class="form-head">
          <h1>기본 사주 리포트 신청</h1>
          <p>정확한 리포트 작성을 위해 아래 정보를 입력해주세요.<br />입력 후 카카오톡으로 연결되어 결제 및 진행 안내를 받으실 수 있습니다.</p>
        </div>

        <form id="applyForm" novalidate>
          <!-- 상품 선택 -->
          <fieldset class="field" style="border:0;padding:0;margin:0 0 22px;">
            <legend class="lbl" style="padding:0;">리포트 선택 <span class="req">*</span></legend>
            <div class="plan-select">
              <label class="plan-opt">
                <input type="radio" name="product" value="기본 사주 리포트 (19,000원)" checked />
                <span class="po-name">기본 사주 리포트</span>
                <span class="po-price">19,000원</span>
              </label>
              <label class="plan-opt">
                <input type="radio" name="product" value="프리미엄 사주 리포트 (39,000원)" />
                <span class="po-name">프리미엄 사주 리포트</span>
                <span class="po-price">39,000원</span>
                <span class="po-tag">카톡에서 선택 가능</span>
              </label>
            </div>
          </fieldset>

          <!-- 이름 -->
          <div class="field">
            <label class="lbl" for="ap-name">이름 <span class="req">*</span></label>
            <input type="text" id="ap-name" name="name" autocomplete="name" placeholder="예) 홍길동" />
          </div>

          <!-- 성별 -->
          <fieldset class="field" style="border:0;padding:0;margin:0 0 22px;">
            <legend class="lbl" style="padding:0;">성별 <span class="req">*</span></legend>
            <div class="opt-row">
              <label><input type="radio" name="gender" value="여성" />여성</label>
              <label><input type="radio" name="gender" value="남성" />남성</label>
              <label><input type="radio" name="gender" value="선택 안 함" />선택 안 함</label>
            </div>
          </fieldset>

          <!-- 생년월일 -->
          <div class="field">
            <label class="lbl" for="ap-birth">생년월일 <span class="req">*</span></label>
            <input type="date" id="ap-birth" name="birth" min="1920-01-01" max="2026-12-31" />
            <p class="field-hint">예) 1978-05-21</p>
          </div>

          <!-- 양력/음력 -->
          <fieldset class="field" style="border:0;padding:0;margin:0 0 22px;">
            <legend class="lbl" style="padding:0;">양력 / 음력 <span class="req">*</span></legend>
            <div class="opt-row">
              <label><input type="radio" name="cal" value="양력" />양력</label>
              <label><input type="radio" name="cal" value="음력" />음력</label>
              <label><input type="radio" name="cal" value="잘 모르겠어요" />잘 모르겠어요</label>
            </div>
          </fieldset>

          <!-- 태어난 시간 -->
          <div class="field">
            <label class="lbl" for="ap-time-know">태어난 시간</label>
            <select id="ap-time-know" name="timeKnow">
              <option value="시간을 알고 있어요">시간을 알고 있어요</option>
              <option value="대략 알고 있어요">대략 알고 있어요</option>
              <option value="잘 모르겠어요">잘 모르겠어요</option>
            </select>
            <input type="text" id="ap-time" name="time" placeholder="예) 오전 7시 30분, 새벽 3시쯤" style="margin-top:10px;" />
          </div>

          <!-- 궁금한 주제 -->
          <fieldset class="field" style="border:0;padding:0;margin:0 0 22px;">
            <legend class="lbl" style="padding:0;">가장 궁금한 주제 <span style="font-weight:400;color:var(--ink-soft);font-size:.85rem;">(복수 선택)</span></legend>
            <div class="chips">
              <label><input type="checkbox" name="topics" value="재물" />재물</label>
              <label><input type="checkbox" name="topics" value="애정" />애정</label>
              <label><input type="checkbox" name="topics" value="직업" />직업</label>
              <label><input type="checkbox" name="topics" value="건강" />건강</label>
              <label><input type="checkbox" name="topics" value="인간관계" />인간관계</label>
              <label><input type="checkbox" name="topics" value="인생 흐름" />인생 흐름</label>
              <label><input type="checkbox" name="topics" value="전체적으로 보고 싶어요" />전체적으로 보고 싶어요</label>
            </div>
          </fieldset>

          <!-- 고민 -->
          <div class="field">
            <label class="lbl" for="ap-worry">남기고 싶은 고민 <span style="font-weight:400;color:var(--ink-soft);font-size:.85rem;">(선택)</span></label>
            <textarea id="ap-worry" name="worry" placeholder="현재 가장 궁금한 점을 편하게 남겨주세요."></textarea>
          </div>

          <!-- 카톡 닉네임 -->
          <div class="field">
            <label class="lbl" for="ap-contact">카카오톡 닉네임 또는 연락처 <span style="font-weight:400;color:var(--ink-soft);font-size:.85rem;">(선택)</span></label>
            <input type="text" id="ap-contact" name="contact" placeholder="카톡에서 확인 가능한 이름을 적어주세요." />
          </div>

          <div class="form-error" id="applyError" role="alert"></div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:8px;">신청 정보 확인하고 카톡으로 이동하기</button>
          <p class="field-hint center" style="margin-top:14px;">입력하신 정보는 리포트 작성과 상담 안내에만 사용됩니다.</p>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" style="padding-bottom:40px;">
    <div class="wrap">
      <div class="nm">명리당</div>
      <small>© 2026 명리당. 본 사주 리포트는 자기 이해를 돕는 참고 자료입니다.</small>
    </div>
  </footer>

  <script src="/js/landing.js"></script>
</body>
</html>
