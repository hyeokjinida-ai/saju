<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명운록 기본 사주 기록 신청</title>
  <meta name="description" content="기본 사주 리포트 신청 — 정보를 입력하면 카카오톡으로 연결되어 결제 및 진행 안내를 받으실 수 있습니다." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/landing.css" />

</head>
<body>

  <header class="site-header">
    <a href="/" class="brand" aria-label="명운록 홈">
      <span class="kr">삶의 흐름을 기록하다</span>
      <span class="nm">명운록</span>
    </a>
    <a href="/" class="head-cta" aria-label="홈으로">홈</a>
  </header>

  <main class="form-page bg-cream-lt">
    <div class="wrap">
      <div class="form-card">
        <div class="form-head">
          <h1>명운록 사주 기록 신청</h1>
          <p id="stepCount" class="step-count">1 / 8</p>
        </div>

        <form id="applyForm" novalidate>
          <!-- 상품은 카톡에서 상담 (히든 기본값) -->
          <input type="hidden" name="product" value="카톡에서 상담 예정" />

          <!-- STEP 1 · 이름 -->
          <div class="step-panel" data-step="1">
            <div class="step-q">이름을 알려주세요.</div>
            <input type="text" id="ap-name" name="name" autocomplete="name" placeholder="예) 홍길동" />
          </div>

          <!-- STEP 2 · 성별 -->
          <div class="step-panel" data-step="2" hidden>
            <div class="step-q">성별을 선택해주세요.</div>
            <div class="opt-row">
              <label><input type="radio" name="gender" value="여성" />여성</label>
              <label><input type="radio" name="gender" value="남성" />남성</label>
              <label><input type="radio" name="gender" value="선택 안 함" />선택 안 함</label>
            </div>
          </div>

          <!-- STEP 3 · 생년월일 (연/월/일 드롭다운) -->
          <div class="step-panel" data-step="3" hidden>
            <div class="step-q">생년월일을 선택해주세요.</div>
            <div class="birth-selects">
              <select id="ap-birth-y" aria-label="태어난 연도"><option value="">연도</option></select>
              <select id="ap-birth-m" aria-label="태어난 월"><option value="">월</option></select>
              <select id="ap-birth-d" aria-label="태어난 일"><option value="">일</option></select>
            </div>
            <input type="hidden" id="ap-birth" name="birth" />
          </div>

          <!-- STEP 4 · 양력/음력 -->
          <div class="step-panel" data-step="4" hidden>
            <div class="step-q">양력인가요, 음력인가요?</div>
            <div class="opt-row">
              <label><input type="radio" name="cal" value="양력" />양력</label>
              <label><input type="radio" name="cal" value="음력" />음력</label>
              <label><input type="radio" name="cal" value="잘 모르겠어요" />잘 모르겠어요</label>
            </div>
          </div>

          <!-- STEP 5 · 태어난 시간 -->
          <div class="step-panel" data-step="5" hidden>
            <div class="step-q">태어난 시간을 알고 계신가요?</div>
            <select id="ap-time-know" name="timeKnow">
              <option value="시간을 알고 있어요">시간을 알고 있어요</option>
              <option value="대략 알고 있어요">대략 알고 있어요</option>
              <option value="잘 모르겠어요">잘 모르겠어요</option>
            </select>
            <input type="text" id="ap-time" name="time" placeholder="예) 오전 7시 30분, 새벽 3시쯤" style="margin-top:10px;" />
            <p class="field-hint">시간을 알면 더 세밀한 기록이 가능합니다. (선택)</p>
          </div>

          <!-- STEP 6 · 궁금한 주제 -->
          <div class="step-panel" data-step="6" hidden>
            <div class="step-q">가장 궁금한 주제는 무엇인가요?</div>
            <p class="field-hint" style="margin:0 0 12px;">복수 선택 가능 · 원국 기록의 방향을 정할 때 참고됩니다.</p>
            <div class="chips">
              <label><input type="checkbox" name="topics" value="재물" />재물</label>
              <label><input type="checkbox" name="topics" value="애정" />애정</label>
              <label><input type="checkbox" name="topics" value="직업" />직업</label>
              <label><input type="checkbox" name="topics" value="건강" />건강</label>
              <label><input type="checkbox" name="topics" value="인간관계" />인간관계</label>
              <label><input type="checkbox" name="topics" value="인생 흐름" />인생 흐름</label>
              <label><input type="checkbox" name="topics" value="전체적으로 보고 싶어요" />전체적으로 보고 싶어요</label>
            </div>
          </div>

          <!-- STEP 7 · 고민 + 연락처 -->
          <div class="step-panel" data-step="7" hidden>
            <div class="step-q">마지막으로, 더 남기실 내용이 있나요? <span style="font-weight:400;color:var(--ink-soft);font-size:.85rem;">(선택)</span></div>
            <textarea id="ap-worry" name="worry" placeholder="현재 가장 궁금한 점을 편하게 남겨주세요."></textarea>
            <input type="text" id="ap-contact" name="contact" placeholder="카톡 닉네임 또는 연락처 (선택)" style="margin-top:12px;" />
          </div>

          <div class="form-error" id="applyError" role="alert"></div>

          <!-- 네비게이션 -->
          <div class="step-nav">
            <button type="button" class="btn btn-ghost" id="stepPrev" hidden>이전</button>
            <button type="button" class="btn btn-primary btn-lg btn-block" id="stepNext">다음</button>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="stepSubmit" hidden>신청하고 카톡으로 이동하기</button>
          </div>
          <p class="field-hint center" style="margin-top:14px;">입력하신 정보는 기록 작성과 상담 안내에만 사용됩니다.</p>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" style="padding-bottom:40px;">
    <div class="wrap">
      <div class="nm">명운록</div>
      <small>© 2026 명운록. 본 사주 리포트는 자기 이해를 돕는 참고 자료입니다.</small>
    </div>
  </footer>

  <script src="/js/landing.js"></script>
</body>
</html>
