<body>

  <header class="site-header">
    <a href="/" class="brand" aria-label="명운록 홈">
      <span class="kr">삶의 흐름을 기록하다</span>
      <span class="nm">명운록</span>
    </a>
    <a href="/" class="head-cta" aria-label="홈으로">홈</a>
  </header>

  <main class="bg-cream-lt">
    <div class="wrap">
      <div class="thanks">
        <div class="check-badge" aria-hidden="true">✓</div>
        <h1>신청 정보가 준비되었습니다</h1>
        <p class="t-lead">아래 버튼을 눌러 카카오톡으로 연결해 주세요.<br />카카오톡에서 결제 안내와 리포트 진행 절차를 도와드립니다.</p>

        <a href="#" id="kakaoBtn" class="btn btn-kakao btn-lg" aria-label="카카오톡으로 상담 이어가기">💬 카카오톡으로 상담 이어가기</a>

        <!-- 입력 요약 (localStorage 기반, JS가 채움) -->
        <div class="summary" id="summary" style="display:none;">
          <h3>신청 내용</h3>
          <dl id="summaryList"></dl>
          <p class="send-note">카카오톡 연결 후 위 내용을 보내주시면 더 빠르게 진행됩니다.</p>
        </div>

        <!-- 요약이 없을 때 안내 -->
        <div class="summary" id="summaryFallback" style="display:none;">
          <h3>카카오톡 연결 후 아래 정보를 보내주세요</h3>
          <ul style="margin:0;padding-left:18px;color:var(--ink-soft);line-height:2;">
            <li>신청 상품</li><li>이름</li><li>생년월일</li><li>양력/음력</li><li>태어난 시간</li><li>궁금한 주제</li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" style="padding-bottom:40px;">
    <div class="wrap">
      <div class="nm">명운록</div>
      <small>© 2026 명운록. 본 사주 리포트는 자기 이해를 돕는 참고 자료입니다.</small>
